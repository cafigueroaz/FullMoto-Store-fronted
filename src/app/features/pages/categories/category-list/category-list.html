<pre>
  {{categories | async}}
</pre>

<h2>HTML table</h2>

<table>.
@for(category of (categories | async); track $index ){
  <tr>
      <td>{{category.name}}</td>
      <td>{{category.description}}</td>
      <td>
        <a href="#">Edit</a>
        <button>Delete</button>
      </td>
  </tr>
}
</table>
