<nav class="navbar">
  <ul class="menu">
    <li><a routerLink="/">Home</a></li>
    <li><a routerLink="/products">Products</a></li>
    <li><a routerLink="/dashboard/products/new">Product new</a></li>
    <li><a routerLink="/dashboard/products/edit">Product edit</a></li>
    <li><a routerLink="/login">Login</a></li>
    <li><a routerLink="/register">Register</a></li>
  </ul>

  <section class="home">

  <h1 class="title">Productos</h1>

  <div class="products-grid">

    @for (product of products$ | async; track product.id) {

      <div class="product-card" [routerLink]="['/products', product.id]">

        <img [src]="product.images?.[0]" class="product-img" />

        <div class="product-info">

          <h3>{{ product.name }}</h3>

          <p class="price">${{ product.price }}</p>

        </div>

      </div>

    }

  </div>

</section>
