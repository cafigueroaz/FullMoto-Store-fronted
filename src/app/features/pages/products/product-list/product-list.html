<div class="list">
  <table class="list-table">
    <thead>
      <tr>
        <th>Producto</th>
        <th>Categoría</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Rating</th>
        <th>Opciones</th>
      </tr>
    </thead>
    <tbody>
      @for (product of products$ | async; track $index) {
        <tr>
          <td>{{ product.name }}</td>
          <td>{{ product.categoryId.name }}</td>
          <td>{{ product.price | currency: 'USD' : 'symbol' : '1.0-0' }}</td>
          <td>{{ product.stock }}</td>
          <td>{{ product.rating }}</td>
          <td>
            <div class="actions">
              <button class="btn btn--edit" (click)="onEdit(product._id)">Editar</button>
              <button class="btn btn--delete" (click)="onDelete(product._id)">Eliminar</button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
